name: PR Checks

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  lint-and-test:
    name: Lint, Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            src/app/package-lock.json
            src/api/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: src/app

      - name: Lint
        run: npm run lint
        working-directory: src/app

      - name: Build (verify no compile errors)
        run: npm run build
        working-directory: src/app

      - name: Install API dependencies
        run: npm ci
        working-directory: src/api

      - name: Test API functions
        run: npm test
        working-directory: src/api
